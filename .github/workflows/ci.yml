name: CI

on:
  push:
    branches: [main, master, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: rh-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — nginx répond
        run: |
          docker run -d -p 8080:80 --name rh-web-test rh-web:ci
          sleep 2
          curl -sf http://localhost:8080/ | grep -q "Hello Pomelo" || (echo "❌ Page non trouvée" && exit 1)
          echo "✅ Smoke test OK"
          docker stop rh-web-test
