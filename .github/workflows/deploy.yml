name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: production
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rh-web

jobs:
  # ─── 1. Build & Push ───────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 2. Deploy sur VPS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy → VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    concurrency:
      group: deploy-${{ inputs.environment || 'production' }}
      cancel-in-progress: false

    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/rh-app

            echo "🚀 Déploiement TAG=sha-${{ github.sha }}"
            export TAG="sha-${{ github.sha }}"

            # Pull de la nouvelle image
            docker compose -f docker-compose.prod.yml pull web

            # Redémarrage zero-downtime (remplace uniquement le container web)
            docker compose -f docker-compose.prod.yml up -d --no-deps --wait web

            # Nettoyage des images obsolètes
            docker image prune -f

            echo "✅ Déploiement terminé — $TAG"

      - name: Vérification post-déploiement
        run: |
          sleep 5
          curl -sf https://app.hello-pomelo.com/ > /dev/null && echo "✅ Site accessible" || echo "⚠️ Vérifier manuellement"
