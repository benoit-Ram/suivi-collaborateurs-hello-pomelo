name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build backend
        run: cd backend && npm run build

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude=node_modules --exclude=.env --exclude=.git --exclude=.github --exclude=.claude
          path: ./
          remote_path: /home/ubuntu/suivi-collaborateurs-hello-pomelo/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Install & restart on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            # The VPS uses fnm (fast node manager). Non-interactive SSH does not
            # run .bashrc, so we add the active node version's bin to PATH
            # (same path used by the systemd units in hp-backend.service).
            FNM_NODE_DIR="$HOME/.local/share/fnm/node-versions"
            if [ -d "$FNM_NODE_DIR" ]; then
              ACTIVE_NODE="$(ls "$FNM_NODE_DIR" 2>/dev/null | sort -V | tail -1)"
              if [ -n "$ACTIVE_NODE" ]; then
                export PATH="$FNM_NODE_DIR/$ACTIVE_NODE/installation/bin:$PATH"
              fi
            fi
            # Fallbacks: NVM or system paths
            if ! command -v npm >/dev/null 2>&1; then
              [ -s "$HOME/.nvm/nvm.sh" ] && \. "$HOME/.nvm/nvm.sh"
              export PATH="/usr/local/bin:/usr/bin:$PATH"
            fi
            echo "Using node=$(command -v node) npm=$(command -v npm)"
            node --version
            npm --version
            cd /home/ubuntu/suivi-collaborateurs-hello-pomelo
            # Backend runs via `npx ts-node` (hp-backend.service) so ts-node
            # is required at runtime even though it's a devDependency.
            # Frontend runs via `vite` (hp-frontend.service) which is also a
            # devDependency. Install all deps on both.
            cd backend && npm ci
            cd ../frontend && npm ci
            sudo systemctl restart hp-backend
            sudo systemctl restart hp-frontend
            echo "Deploy done at $(date)"
