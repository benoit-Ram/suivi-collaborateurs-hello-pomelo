name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build backend
        run: cd backend && npm run build

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude=node_modules --exclude=.env --exclude=.git --exclude=.github --exclude=.claude
          path: ./
          remote_path: /home/ubuntu/suivi-collaborateurs-hello-pomelo/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Install & restart on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            # Source NVM if present (non-interactive SSH sessions don't run .bashrc)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            # Fallback: try common system paths for node/npm
            if ! command -v npm >/dev/null 2>&1; then
              export PATH="/usr/local/bin:/usr/bin:$PATH"
            fi
            echo "Using node=$(command -v node) npm=$(command -v npm)"
            node --version
            npm --version
            cd /home/ubuntu/suivi-collaborateurs-hello-pomelo
            cd backend && npm ci --omit=dev
            cd ../frontend && npm ci --omit=dev
            sudo systemctl restart hp-backend
            sudo systemctl restart hp-frontend
            echo "Deploy done at $(date)"
